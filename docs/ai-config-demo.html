<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 配置 — DidClaw Demo</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: #141414;
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh;
    color: #e8e8e8;
  }

  /* ─── Dialog ──────────────────────────────────────────────── */
  .dialog {
    background: #242424;
    border-radius: 14px;
    width: 820px;
    height: 580px;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    box-shadow: 0 24px 72px rgba(0,0,0,.65);
    position: relative;
  }

  /* ─── Header ──────────────────────────────────────────────── */
  .dialog-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 20px 0;
    flex-shrink: 0;
  }
  .dialog-title { font-size: 15px; font-weight: 600; color: #f0f0f0; }
  .dialog-close {
    width: 28px; height: 28px;
    border: none; background: transparent;
    color: #666; font-size: 16px; cursor: pointer;
    border-radius: 6px; display: flex; align-items: center; justify-content: center;
    transition: background .15s, color .15s;
  }
  .dialog-close:hover { background: #333; color: #fff; }

  /* ─── Body ────────────────────────────────────────────────── */
  .dialog-body {
    display: flex;
    flex: 1;
    overflow: hidden;
    padding: 12px 0 0;
    border-top: 1px solid #2e2e2e;
    margin-top: 12px;
  }

  /* ─── Sidebar ─────────────────────────────────────────────── */
  .sidebar {
    width: 136px;
    flex-shrink: 0;
    padding: 0 12px;
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  .sidebar-item {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 8px 10px;
    border-radius: 8px;
    font-size: 13px;
    color: #999;
    cursor: pointer;
    transition: background .15s, color .15s;
    white-space: nowrap;
    user-select: none;
    border: none; background: transparent;
    font-family: inherit; text-align: left; width: 100%;
  }
  .sidebar-item:hover { background: #2e2e2e; color: #ddd; }
  .sidebar-item.active {
    background: #2a2a2a;
    color: #fff;
    font-weight: 500;
    border-left: 3px solid #4f8fff;
    padding-left: 7px;
  }
  .sidebar-badge {
    margin-left: auto;
    font-size: 11px;
    color: #34c759;
    font-weight: 500;
  }
  .sidebar-divider { height: 1px; background: #2e2e2e; margin: 6px 4px; }

  /* ─── Main ────────────────────────────────────────────────── */
  .main {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    padding: 0 16px 0 10px;
  }

  /* ─── Primary model banner ────────────────────────────────── */
  .primary-banner {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 14px;
    background: linear-gradient(90deg, rgba(79,143,255,.12) 0%, rgba(79,143,255,.04) 100%);
    border: 1px solid rgba(79,143,255,.3);
    border-radius: 10px;
    margin-bottom: 12px;
    flex-shrink: 0;
    cursor: pointer;
    transition: border-color .15s;
  }
  .primary-banner:hover { border-color: rgba(79,143,255,.6); }
  .primary-label {
    font-size: 11px;
    color: #4f8fff;
    font-weight: 500;
    white-space: nowrap;
  }
  .primary-dot { width: 1px; height: 14px; background: rgba(79,143,255,.3); flex-shrink: 0; }
  .primary-value {
    flex: 1;
    font-size: 13px;
    font-weight: 500;
    color: #e8e8e8;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .primary-change {
    font-size: 11px;
    color: #4f8fff;
    white-space: nowrap;
    opacity: .7;
  }

  /* ─── Search row ──────────────────────────────────────────── */
  .search-row {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-shrink: 0;
    margin-bottom: 8px;
  }
  .search-wrap { flex: 1; position: relative; }
  .search-icon {
    position: absolute; left: 10px; top: 50%; transform: translateY(-50%);
    color: #555; font-size: 13px; pointer-events: none;
  }
  .search-input {
    width: 100%;
    background: #1a1a1a;
    border: 1px solid #333;
    border-radius: 8px;
    padding: 7px 10px 7px 30px;
    font-size: 13px;
    color: #e0e0e0;
    outline: none;
    transition: border-color .15s;
    font-family: inherit;
  }
  .search-input::placeholder { color: #555; }
  .search-input:focus { border-color: #4f8fff; }

  /* ─── Tags ────────────────────────────────────────────────── */
  .tags-row {
    display: flex;
    gap: 6px;
    overflow-x: auto;
    flex-shrink: 0;
    margin-bottom: 10px;
    scrollbar-width: none;
    padding-bottom: 2px;
  }
  .tags-row::-webkit-scrollbar { display: none; }
  .tag {
    padding: 3px 10px;
    background: #1e1e1e;
    border: 1px solid #2e2e2e;
    border-radius: 20px;
    font-size: 12px;
    color: #888;
    cursor: pointer;
    white-space: nowrap;
    transition: background .15s, color .15s, border-color .15s;
    user-select: none;
  }
  .tag:hover { background: #2a2a2a; color: #ccc; }
  .tag.active {
    background: rgba(79,143,255,.12);
    border-color: #4f8fff;
    color: #4f8fff;
  }

  /* ─── Provider grid ───────────────────────────────────────── */
  .providers-grid {
    flex: 1;
    overflow-y: auto;
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
    align-content: start;
    padding-right: 4px;
    scrollbar-width: thin;
    scrollbar-color: #333 transparent;
  }
  .providers-grid::-webkit-scrollbar { width: 4px; }
  .providers-grid::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }

  /* ─── Provider card ───────────────────────────────────────── */
  .provider-card {
    background: #1e1e1e;
    border: 1px solid #2a2a2a;
    border-radius: 10px;
    padding: 12px;
    cursor: pointer;
    transition: border-color .15s, background .15s;
    display: flex;
    flex-direction: column;
    gap: 5px;
    min-height: 100px;
  }
  .provider-card:hover { border-color: #3d3d3d; background: #242424; }
  .provider-card.active { border-color: #4f8fff; background: rgba(79,143,255,.05); }

  .card-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 6px;
  }
  .card-icon { font-size: 18px; line-height: 1; flex-shrink: 0; }
  .card-badge {
    font-size: 10px;
    padding: 2px 7px;
    border-radius: 10px;
    font-weight: 500;
    white-space: nowrap;
  }
  .badge-primary   { background: rgba(79,143,255,.18); color: #4f8fff; }
  .badge-ready     { background: rgba(52,199,89,.15);  color: #34c759; }
  .badge-pending   { background: #2a2a2a; color: #777; border: 1px solid #333; }
  .badge-local     { background: rgba(255,149,0,.12);  color: #ff9500; }

  .card-name { font-size: 13px; font-weight: 500; color: #e0e0e0; }
  .card-desc {
    font-size: 11px; color: #666; line-height: 1.4;
    display: -webkit-box;
    -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
  }
  .card-meta {
    display: flex; align-items: center; gap: 6px;
    font-size: 10px; color: #555; margin-top: auto;
  }
  .card-meta .dot { width: 3px; height: 3px; background: #444; border-radius: 50%; flex-shrink: 0; }
  .card-url { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 110px; }

  /* ─── Bottom panel ────────────────────────────────────────── */
  .bottom-panel {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    background: #1c1c1c;
    border-top: 1px solid #333;
    border-radius: 0 0 14px 14px;
    transform: translateY(100%);
    transition: transform .24s cubic-bezier(.4,0,.2,1);
    display: flex;
    flex-direction: column;
    max-height: 260px;
    box-shadow: 0 -8px 24px rgba(0,0,0,.3);
  }
  .bottom-panel.visible { transform: translateY(0); }

  .panel-head {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 14px 20px 10px;
    flex-shrink: 0;
    border-bottom: 1px solid #2a2a2a;
  }
  .panel-icon { font-size: 22px; flex-shrink: 0; }
  .panel-info { flex: 1; min-width: 0; }
  .panel-name { font-size: 14px; font-weight: 600; color: #f0f0f0; margin-bottom: 2px; }
  .panel-url  { font-size: 11px; color: #555; font-family: monospace; }

  .panel-actions-top { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
  .panel-close {
    width: 28px; height: 28px;
    border: none; background: #2a2a2a; color: #888;
    font-size: 13px; cursor: pointer; border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    transition: background .15s;
  }
  .panel-close:hover { background: #333; color: #fff; }

  .panel-body {
    flex: 1;
    overflow-y: auto;
    padding: 12px 20px 16px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .panel-fields {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }
  .field-group { display: flex; flex-direction: column; gap: 5px; }
  .field-label { font-size: 11px; color: #666; }
  .field-wrap { position: relative; }
  .field-input {
    width: 100%;
    background: #1a1a1a;
    border: 1px solid #2e2e2e;
    border-radius: 7px;
    padding: 7px 10px;
    font-size: 12px;
    color: #e0e0e0;
    outline: none;
    font-family: monospace;
    transition: border-color .15s;
  }
  .field-input:focus { border-color: #4f8fff; }
  .field-input::placeholder { color: #444; }
  .field-eye {
    position: absolute; right: 8px; top: 50%; transform: translateY(-50%);
    font-size: 13px; color: #555; cursor: pointer; user-select: none;
  }

  .panel-footer {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .panel-model-select {
    flex: 1;
    background: #1a1a1a;
    border: 1px solid #2e2e2e;
    border-radius: 7px;
    padding: 7px 10px;
    font-size: 12px;
    color: #e0e0e0;
    outline: none;
    font-family: inherit;
    cursor: pointer;
  }

  /* ─── Buttons ─────────────────────────────────────────────── */
  .btn {
    padding: 7px 16px;
    border: none; border-radius: 7px;
    font-size: 12px; font-weight: 500;
    cursor: pointer; transition: opacity .15s, background .15s;
    font-family: inherit; white-space: nowrap;
  }
  .btn:disabled { opacity: .4; cursor: not-allowed; }
  .btn-primary { background: #4f8fff; color: #fff; }
  .btn-primary:hover:not(:disabled) { background: #3d7bf5; }
  .btn-secondary { background: #2e2e2e; color: #ccc; border: 1px solid #383838; }
  .btn-secondary:hover:not(:disabled) { background: #363636; }
  .btn-ghost {
    background: transparent; color: #888;
    border: 1px solid #333; padding: 7px 12px;
  }
  .btn-ghost:hover { background: #2a2a2a; color: #ccc; }
  .btn-set-primary {
    background: rgba(79,143,255,.15); color: #4f8fff; border: 1px solid rgba(79,143,255,.3);
  }
  .btn-set-primary:hover { background: rgba(79,143,255,.25); }

  /* ─── Fallback models (connect tab stub) ──────────────────── */
  .connect-tab, .advanced-tab {
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    flex: 1; gap: 10px; color: #555; font-size: 13px;
  }
  .connect-tab-icon, .advanced-tab-icon { font-size: 36px; opacity: .4; }

  /* ─── Fallback row (AI config tab bottom stub) ────────────── */
  .fallback-bar {
    display: flex; align-items: center; gap: 8px;
    padding: 8px 12px;
    background: #1e1e1e;
    border: 1px solid #2a2a2a;
    border-radius: 8px;
    margin-bottom: 10px;
    flex-shrink: 0;
    font-size: 12px;
  }
  .fallback-label { color: #666; white-space: nowrap; }
  .fallback-tags { display: flex; gap: 5px; flex: 1; flex-wrap: wrap; }
  .fallback-tag {
    padding: 2px 8px;
    background: #2a2a2a;
    border: 1px solid #333;
    border-radius: 5px;
    font-size: 11px; color: #999;
    display: flex; align-items: center; gap: 4px;
  }
  .fallback-tag-remove { color: #555; cursor: pointer; }
  .fallback-tag-remove:hover { color: #ff3b30; }
  .fallback-add { color: #4f8fff; cursor: pointer; font-size: 11px; }
</style>
</head>
<body>

<div class="dialog">
  <!-- Header -->
  <div class="dialog-header">
    <span class="dialog-title">AI 配置</span>
    <button class="dialog-close" onclick="closePanel()">✕</button>
  </div>

  <!-- Body -->
  <div class="dialog-body">

    <!-- Sidebar -->
    <div class="sidebar">
      <button class="sidebar-item" onclick="switchTab('connect', this)">① 连助手</button>
      <button class="sidebar-item active" onclick="switchTab('ai', this)">② AI 配置
        <span class="sidebar-badge">●</span>
      </button>
      <div class="sidebar-divider"></div>
      <button class="sidebar-item" onclick="switchTab('advanced', this)">高级设置</button>
    </div>

    <!-- AI Config tab -->
    <div class="main" id="tab-ai">
      <!-- Primary model -->
      <div class="primary-banner" onclick="alert('切换主力模型')">
        <span class="primary-label">当前主力模型</span>
        <span class="primary-dot"></span>
        <span class="primary-value">🌙 Kimi (Moonshot) · kimi-k2.5</span>
        <span class="primary-change">切换 ›</span>
      </div>

      <!-- Fallback bar -->
      <div class="fallback-bar">
        <span class="fallback-label">备用模型</span>
        <div class="fallback-tags">
          <span class="fallback-tag">deepseek/deepseek-chat <span class="fallback-tag-remove" onclick="this.parentElement.remove()">×</span></span>
          <span class="fallback-tag">google/gemini-2.0-flash <span class="fallback-tag-remove" onclick="this.parentElement.remove()">×</span></span>
        </div>
        <span class="fallback-add" onclick="alert('添加备用')">+ 添加</span>
      </div>

      <!-- Search -->
      <div class="search-row">
        <div class="search-wrap">
          <span class="search-icon">🔍</span>
          <input class="search-input" type="text" placeholder="搜索服务商…" oninput="filterProviders(this.value)">
        </div>
      </div>

      <!-- Tags -->
      <div class="tags-row" id="tags-row">
        <div class="tag active" onclick="filterTag('all',this)">全部</div>
        <div class="tag" onclick="filterTag('configured',this)">已配置</div>
        <div class="tag" onclick="filterTag('recommended',this)">推荐</div>
        <div class="tag" onclick="filterTag('cn',this)">国内</div>
        <div class="tag" onclick="filterTag('intl',this)">海外</div>
        <div class="tag" onclick="filterTag('local',this)">本地</div>
      </div>

      <!-- Grid -->
      <div class="providers-grid" id="providers-grid"></div>
    </div>

    <!-- Connect tab (stub) -->
    <div class="main connect-tab" id="tab-connect" style="display:none">
      <div class="connect-tab-icon">🔌</div>
      <div>连接助手网关</div>
      <div style="font-size:11px;color:#444">在此配置 OpenClaw 网关地址和认证信息</div>
    </div>

    <!-- Advanced tab (stub) -->
    <div class="main advanced-tab" id="tab-advanced" style="display:none">
      <div class="advanced-tab-icon">⚙️</div>
      <div>高级设置</div>
      <div style="font-size:11px;color:#444">代理、日志级别、实验性功能等</div>
    </div>

  </div><!-- /dialog-body -->

  <!-- Bottom config panel -->
  <div class="bottom-panel" id="bottom-panel">
    <div class="panel-head">
      <div class="panel-icon" id="panel-icon">🤖</div>
      <div class="panel-info">
        <div class="panel-name" id="panel-name">服务商名称</div>
        <div class="panel-url" id="panel-url">https://api.example.com/v1</div>
      </div>
      <div class="panel-actions-top">
        <button class="btn btn-set-primary" id="btn-set-primary">设为主力</button>
        <button class="panel-close" onclick="closePanel()">✕</button>
      </div>
    </div>
    <div class="panel-body">
      <div class="panel-fields">
        <div class="field-group">
          <label class="field-label">API Key</label>
          <div class="field-wrap">
            <input id="field-apikey" class="field-input" type="password" placeholder="sk-…">
            <span class="field-eye" onclick="toggleKey()">👁</span>
          </div>
        </div>
        <div class="field-group">
          <label class="field-label">Base URL</label>
          <div class="field-wrap">
            <input id="field-baseurl" class="field-input" type="text" placeholder="https://api.example.com/v1">
          </div>
        </div>
      </div>
      <div class="panel-footer">
        <select id="panel-model-select" class="panel-model-select">
          <option value="">— 选择主力模型 —</option>
        </select>
        <button class="btn btn-ghost" onclick="closePanel()">取消</button>
        <button class="btn btn-primary" onclick="saveProvider()">保存</button>
      </div>
    </div>
  </div>
</div>

    desc: '统一接入 100+ 模型，一个 Key 路由所有服务商，按需计费。',
    url: 'https://openrouter.ai/api/v1', modelCount: 2,
    tags: ['intl'], status: 'pending',
    models: ['openrouter/auto','meta-llama/llama-3.3-70b'],
    apiKey: ''
  },
  {
    id: 'xai', icon: '𝕏', name: 'xAI (Grok)', region: 'intl',
    desc: 'Grok 4 超级智能，支持实时信息检索与推理，Elon Musk 出品。',
    url: 'https://api.x.ai/v1', modelCount: 2,
    tags: ['intl'], status: 'pending',
    models: ['grok-4','grok-3-mini'],
    apiKey: ''
  },
  {
    id: 'mistral', icon: '💫', name: 'Mistral', region: 'intl',
    desc: 'Mistral Large 欧洲强模型，开源与商用双线，注重隐私合规。',
    url: 'https://api.mistral.ai/v1', modelCount: 2,
    tags: ['intl'], status: 'pending',
    models: ['mistral-large-latest','mistral-small-latest'],
    apiKey: ''
  },
  {
    id: 'ollama', icon: '🦙', name: 'Ollama（本机）', region: 'local',
    desc: '本机运行 Llama / Qwen / Gemma 等开源模型，完全离线私密。',
    url: 'http://localhost:11434/v1', modelCount: 0,
    tags: ['local'], status: 'local',
    models: [],
    apiKey: ''
  },
];

let activeTag = 'all';
let activeCard = null;
let currentProvider = null;
let searchQuery = '';

function getFiltered() {
  const q = searchQuery.toLowerCase();
  return PROVIDERS.filter(p => {
    const tagOk = activeTag === 'all' ||
      (activeTag === 'configured' && (p.status === 'primary' || p.status === 'ready')) ||
      (activeTag === 'recommended' && p.tags.includes('recommended')) ||
      p.tags.includes(activeTag);
    const qOk = !q || p.name.toLowerCase().includes(q) || p.desc.toLowerCase().includes(q);
    return tagOk && qOk;
  });
}

function renderGrid(providers) {
  const grid = document.getElementById('providers-grid');
  if (!providers.length) {
    grid.innerHTML = '<div style="grid-column:1/-1;display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;gap:8px;color:#555;font-size:13px;padding:40px 0"><span style="font-size:32px;opacity:.4">🔍</span><span>未找到匹配的服务商</span></div>';
    return;
  }
  grid.innerHTML = providers.map(p => {
    const badgeClass = p.status === 'primary' ? 'badge-primary'
                     : p.status === 'ready'   ? 'badge-ready'
                     : p.status === 'local'   ? 'badge-local'
                     : 'badge-pending';
    const badgeText = p.status === 'primary' ? '主力'
                    : p.status === 'ready'   ? '已配置'
                    : p.status === 'local'   ? '本地'
                    : '待配置';
    const isActive = activeCard === p.id;
    return `
      <div class="provider-card${isActive ? ' active' : ''}" onclick="selectProvider('${p.id}')" id="card-${p.id}">
        <div class="card-head">
          <span class="card-icon">${p.icon}</span>
          <span class="card-badge ${badgeClass}">${badgeText}</span>
        </div>
        <div class="card-name">${p.name}</div>
        <div class="card-desc">${p.desc}</div>
        <div class="card-meta">
          ${p.modelCount > 0 ? `<span>${p.modelCount} 个推荐模型</span><span class="dot"></span>` : ''}
          <span class="card-url">${p.url.replace('https://','').replace('http://','')}</span>
        </div>
      </div>`;
  }).join('');
}

function filterTag(tag, el) {
  activeTag = tag;
  document.querySelectorAll('.tag').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  renderGrid(getFiltered());
}

function filterProviders(q) {
  searchQuery = q;
  renderGrid(getFiltered());
}

function selectProvider(id) {
  activeCard = id;
  currentProvider = PROVIDERS.find(p => p.id === id);
  document.querySelectorAll('.provider-card').forEach(c => c.classList.remove('active'));
  const card = document.getElementById('card-' + id);
  if (card) card.classList.add('active');
  openPanel(currentProvider);
}

function openPanel(p) {
  document.getElementById('panel-icon').textContent = p.icon;
  document.getElementById('panel-name').textContent = p.name;
  document.getElementById('panel-url').textContent = p.url;
  document.getElementById('field-apikey').value = p.apiKey || '';
  document.getElementById('field-baseurl').value = p.url;

  const sel = document.getElementById('panel-model-select');
  sel.innerHTML = '<option value="">— 选择主力模型 —</option>' +
    p.models.map(m => `<option value="${m}">${m}</option>`).join('');

  const btnPrimary = document.getElementById('btn-set-primary');
  if (p.status === 'primary') {
    btnPrimary.textContent = '✓ 当前主力';
    btnPrimary.disabled = true;
  } else {
    btnPrimary.textContent = '设为主力';
    btnPrimary.disabled = false;
  }

  if (p.status === 'local') {
    document.getElementById('field-apikey').placeholder = '本地模型无需 Key';
    document.getElementById('field-apikey').disabled = true;
  } else {
    document.getElementById('field-apikey').placeholder = 'sk-…';
    document.getElementById('field-apikey').disabled = false;
  }

  document.getElementById('bottom-panel').classList.add('visible');
}

function closePanel() {
  document.getElementById('bottom-panel').classList.remove('visible');
  activeCard = null;
  document.querySelectorAll('.provider-card').forEach(c => c.classList.remove('active'));
}

function saveProvider() {
  if (!currentProvider) return;
  const key = document.getElementById('field-apikey').value.trim();
  if (key && !currentProvider.apiKey) {
    currentProvider.status = 'ready';
    currentProvider.apiKey = key;
  }
  closePanel();
  renderGrid(getFiltered());
  showToast(`已保存 ${currentProvider.name} 配置`);
}

function toggleKey() {
  const inp = document.getElementById('field-apikey');
  inp.type = inp.type === 'password' ? 'text' : 'password';
}

function switchTab(tab, el) {
  document.querySelectorAll('.sidebar-item').forEach(i => i.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('tab-ai').style.display      = tab === 'ai'       ? 'flex' : 'none';
  document.getElementById('tab-connect').style.display = tab === 'connect'  ? 'flex' : 'none';
  document.getElementById('tab-advanced').style.display = tab === 'advanced' ? 'flex' : 'none';
  closePanel();
}

// Simple toast
function showToast(msg) {
  let t = document.getElementById('demo-toast');
  if (!t) {
    t = document.createElement('div');
    t.id = 'demo-toast';
    t.style.cssText = 'position:fixed;bottom:32px;left:50%;transform:translateX(-50%);background:#34c759;color:#000;padding:8px 18px;border-radius:8px;font-size:13px;font-weight:500;z-index:9999;pointer-events:none;transition:opacity .3s';
    document.body.appendChild(t);
  }
  t.textContent = msg;
  t.style.opacity = '1';
  clearTimeout(t._timer);
  t._timer = setTimeout(() => { t.style.opacity = '0'; }, 2500);
}

renderGrid(getFiltered());
</script>
</body>
</html>
