<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>技能管理 — DidClaw Demo</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: #1a1a1a;
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh;
    color: #e8e8e8;
  }

  /* ─── Dialog ─────────────────────────────────────────────── */
  .dialog {
    background: #242424;
    border-radius: 14px;
    width: 780px;
    height: 560px;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    box-shadow: 0 24px 64px rgba(0,0,0,.6);
    position: relative;
  }

  /* ─── Header ─────────────────────────────────────────────── */
  .dialog-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 18px 20px 0;
    flex-shrink: 0;
  }
  .dialog-title {
    font-size: 16px;
    font-weight: 600;
    color: #f0f0f0;
  }
  .dialog-close {
    width: 28px; height: 28px;
    border: none; background: transparent;
    color: #888; font-size: 18px; cursor: pointer;
    border-radius: 6px; display: flex; align-items: center; justify-content: center;
    transition: background .15s, color .15s;
  }
  .dialog-close:hover { background: #333; color: #fff; }

  /* ─── Body layout ────────────────────────────────────────── */
  .dialog-body {
    display: flex;
    flex: 1;
    overflow: hidden;
    padding: 14px 0 0;
  }

  /* ─── Sidebar ────────────────────────────────────────────── */
  .sidebar {
    width: 130px;
    flex-shrink: 0;
    padding: 0 12px;
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  .sidebar-item {
    padding: 8px 12px;
    border-radius: 8px;
    font-size: 13px;
    color: #aaa;
    cursor: pointer;
    transition: background .15s, color .15s;
    white-space: nowrap;
    user-select: none;
  }
  .sidebar-item:hover { background: #2e2e2e; color: #ddd; }
  .sidebar-item.active {
    background: #2e2e2e;
    color: #fff;
    font-weight: 500;
    border-left: 3px solid #4f8fff;
    padding-left: 9px;
  }
  .sidebar-divider {
    height: 1px;
    background: #333;
    margin: 8px 4px;
  }

  /* ─── Main content ────────────────────────────────────────── */
  .main {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    padding: 0 16px 0 8px;
  }

  /* ─── Search row ─────────────────────────────────────────── */
  .search-row {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-shrink: 0;
    margin-bottom: 10px;
  }
  .search-wrap {
    flex: 1;
    position: relative;
  }
  .search-icon {
    position: absolute; left: 10px; top: 50%; transform: translateY(-50%);
    color: #666; font-size: 14px; pointer-events: none;
  }
  .search-input {
    width: 100%;
    background: #1a1a1a;
    border: 1px solid #333;
    border-radius: 8px;
    padding: 8px 10px 8px 32px;
    font-size: 13px;
    color: #e0e0e0;
    outline: none;
    transition: border-color .15s;
  }
  .search-input::placeholder { color: #555; }
  .search-input:focus { border-color: #4f8fff; }
  .view-toggle {
    display: flex;
    background: #1a1a1a;
    border: 1px solid #333;
    border-radius: 8px;
    overflow: hidden;
    flex-shrink: 0;
  }
  .view-btn {
    padding: 7px 10px;
    border: none; background: transparent;
    color: #666; font-size: 13px; cursor: pointer;
    transition: background .15s, color .15s;
  }
  .view-btn.active { background: #333; color: #fff; }

  /* ─── Tags ───────────────────────────────────────────────── */
  .tags-row {
    display: flex;
    gap: 6px;
    overflow-x: auto;
    flex-shrink: 0;
    margin-bottom: 12px;
    scrollbar-width: none;
    padding-bottom: 2px;
  }
  .tags-row::-webkit-scrollbar { display: none; }
  .tag {
    padding: 4px 10px;
    background: #1e1e1e;
    border: 1px solid #333;
    border-radius: 20px;
    font-size: 12px;
    color: #aaa;
    cursor: pointer;
    white-space: nowrap;
    transition: background .15s, color .15s, border-color .15s;
    user-select: none;
  }
  .tag:hover { background: #2a2a2a; color: #ddd; }
  .tag.active {
    background: rgba(79,143,255,.15);
    border-color: #4f8fff;
    color: #4f8fff;
  }

  /* ─── Skill grid ─────────────────────────────────────────── */
  .skills-grid {
    flex: 1;
    overflow-y: auto;
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
    align-content: start;
    padding-right: 4px;
    scrollbar-width: thin;
    scrollbar-color: #333 transparent;
  }
  .skills-grid::-webkit-scrollbar { width: 4px; }
  .skills-grid::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }

  /* ─── Skill card ─────────────────────────────────────────── */
  .skill-card {
    background: #1e1e1e;
    border: 1px solid #2e2e2e;
    border-radius: 10px;
    padding: 12px;
    cursor: pointer;
    transition: border-color .15s, background .15s, transform .1s;
    position: relative;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .skill-card:hover {
    border-color: #444;
    background: #252525;
    transform: translateY(-1px);
  }
  .skill-card.active {
    border-color: #4f8fff;
    background: rgba(79,143,255,.06);
  }

  .card-top {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 8px;
  }
  .card-icon {
    width: 36px; height: 36px;
    border-radius: 8px;
    background: #2a2a2a;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
    flex-shrink: 0;
  }
  .card-badge {
    font-size: 10px;
    padding: 2px 6px;
    border-radius: 10px;
    font-weight: 500;
    flex-shrink: 0;
  }
  .badge-installed { background: rgba(52,199,89,.15); color: #34c759; }
  .badge-free { background: rgba(79,143,255,.15); color: #4f8fff; }
  .badge-official { background: rgba(255,149,0,.12); color: #ff9500; }

  .card-name {
    font-size: 13px;
    font-weight: 500;
    color: #e0e0e0;
    line-height: 1.3;
  }
  .card-desc {
    font-size: 11px;
    color: #777;
    line-height: 1.4;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .card-meta {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 10px;
    color: #555;
    margin-top: auto;
  }
  .card-meta .dot { width: 3px; height: 3px; background: #444; border-radius: 50%; }

  /* ─── Bottom detail panel ────────────────────────────────── */
  .bottom-panel {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    background: #1e1e1e;
    border-top: 1px solid #333;
    border-radius: 0 0 14px 14px;
    padding: 16px 20px;
    transform: translateY(100%);
    transition: transform .25s cubic-bezier(.4,0,.2,1);
    display: flex;
    flex-direction: column;
    gap: 10px;
    max-height: 220px;
  }
  .bottom-panel.visible { transform: translateY(0); }

  .panel-row {
    display: flex;
    align-items: flex-start;
    gap: 12px;
  }
  .panel-icon {
    width: 44px; height: 44px;
    border-radius: 10px;
    background: #2a2a2a;
    display: flex; align-items: center; justify-content: center;
    font-size: 22px;
    flex-shrink: 0;
  }
  .panel-info { flex: 1; min-width: 0; }
  .panel-name {
    font-size: 15px;
    font-weight: 600;
    color: #f0f0f0;
    margin-bottom: 3px;
  }
  .panel-desc { font-size: 12px; color: #888; line-height: 1.5; }

  .panel-actions {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-shrink: 0;
  }
  .panel-close {
    width: 28px; height: 28px;
    border: none; background: #2a2a2a;
    color: #888; font-size: 14px; cursor: pointer;
    border-radius: 6px; display: flex; align-items: center; justify-content: center;
    transition: background .15s;
    align-self: flex-start;
  }
  .panel-close:hover { background: #333; color: #fff; }

  .panel-meta {
    display: flex;
    gap: 16px;
    font-size: 11px;
    color: #666;
    border-top: 1px solid #2a2a2a;
    padding-top: 8px;
  }
  .panel-meta-item { display: flex; flex-direction: column; gap: 2px; }
  .panel-meta-label { font-size: 10px; color: #555; }
  .panel-meta-value { color: #aaa; }

  .btn {
    padding: 7px 16px;
    border: none;
    border-radius: 7px;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    transition: opacity .15s, background .15s;
  }
  .btn:disabled { opacity: .4; cursor: not-allowed; }
  .btn-primary { background: #4f8fff; color: #fff; }
  .btn-primary:hover:not(:disabled) { background: #3d7bf5; }
  .btn-secondary { background: #2e2e2e; color: #ccc; }
  .btn-secondary:hover:not(:disabled) { background: #383838; }
  .btn-danger { background: rgba(255,59,48,.15); color: #ff3b30; }
  .btn-danger:hover:not(:disabled) { background: rgba(255,59,48,.25); }

  /* ─── Installing state ───────────────────────────────────── */
  @keyframes spin { to { transform: rotate(360deg); } }
  .spinner {
    width: 14px; height: 14px;
    border: 2px solid rgba(255,255,255,.2);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin .7s linear infinite;
    display: inline-block;
    vertical-align: middle;
    margin-right: 5px;
  }

  /* ─── Empty state ────────────────────────────────────────── */
  .empty-state {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: #555;
    gap: 8px;
    font-size: 13px;
  }
  .empty-icon { font-size: 32px; opacity: .5; }

  /* ─── Installed tab view (list) ──────────────────────────── */
  .installed-list {
    flex: 1;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 6px;
    scrollbar-width: thin;
    scrollbar-color: #333 transparent;
  }
  .installed-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 12px;
    background: #1e1e1e;
    border: 1px solid #2e2e2e;
    border-radius: 10px;
    cursor: pointer;
    transition: border-color .15s;
  }
  .installed-item:hover { border-color: #444; }
  .installed-item-icon { font-size: 20px; }
  .installed-item-info { flex: 1; min-width: 0; }
  .installed-item-name { font-size: 13px; font-weight: 500; color: #e0e0e0; }
  .installed-item-version { font-size: 11px; color: #666; margin-top: 2px; }
  .installed-item-status {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: #34c759;
    flex-shrink: 0;
  }
</style>
</head>
<body>

<div class="dialog">
  <!-- Header -->
  <div class="dialog-header">
    <span class="dialog-title">技能管理</span>
    <button class="dialog-close" onclick="closePanel()">✕</button>
  </div>

  <!-- Body -->
  <div class="dialog-body">

    <!-- Sidebar -->
    <div class="sidebar">
      <div class="sidebar-item active" onclick="switchTab('market', this)">技能市场</div>
      <div class="sidebar-item" onclick="switchTab('installed', this)">已安装 <span id="installed-count" style="color:#555;font-size:11px">3</span></div>
      <div class="sidebar-divider"></div>
      <div class="sidebar-item" onclick="switchTab('local', this)">本地技能库</div>
      <div class="sidebar-item" onclick="switchTab('import', this)">手动导入</div>
    </div>

    <!-- Market tab -->
    <div class="main" id="tab-market">
      <!-- Search -->
      <div class="search-row">
        <div class="search-wrap">
          <span class="search-icon">🔍</span>
          <input class="search-input" type="text" placeholder="搜索技能名称…" oninput="filterSkills(this.value)">
        </div>
        <div class="view-toggle">
          <button class="view-btn active" onclick="setView('grid',this)" title="卡片">⊞</button>
          <button class="view-btn" onclick="setView('list',this)" title="列表">☰</button>
        </div>
      </div>

      <!-- Tags -->
      <div class="tags-row" id="tags-row">
        <div class="tag active" onclick="filterTag('all',this)">全部</div>
        <div class="tag" onclick="filterTag('search',this)">搜索</div>
        <div class="tag" onclick="filterTag('agent',this)">代理</div>
        <div class="tag" onclick="filterTag('code',this)">代码</div>
        <div class="tag" onclick="filterTag('free',this)">免费</div>
        <div class="tag" onclick="filterTag('doc',this)">文档</div>
        <div class="tag" onclick="filterTag('mail',this)">邮件</div>
        <div class="tag" onclick="filterTag('calendar',this)">日历</div>
        <div class="tag" onclick="filterTag('db',this)">数据库</div>
        <div class="tag" onclick="filterTag('auto',this)">自动化</div>
        <div class="tag" onclick="filterTag('api',this)">API 接口</div>
        <div class="tag" onclick="filterTag('official',this)">官方</div>
      </div>

      <!-- Grid -->
      <div class="skills-grid" id="skills-grid"></div>
    </div>

    <!-- Installed tab -->
    <div class="main" id="tab-installed" style="display:none">
      <div class="installed-list" id="installed-list"></div>
    </div>

    <!-- Local tab -->
    <div class="main" id="tab-local" style="display:none">
      <div class="empty-state">
        <div class="empty-icon">📂</div>
        <div>本地技能库为空</div>
        <div style="font-size:11px;color:#444">将技能文件夹放入 ~/.openclaw/skills 即可</div>
      </div>
    </div>

    <!-- Import tab -->
    <div class="main" id="tab-import" style="display:none">
      <div style="display:flex;flex-direction:column;gap:12px;padding:4px 0">
        <div>
          <div style="font-size:12px;color:#888;margin-bottom:6px">导入目录</div>
          <div style="background:#1a1a1a;border:1px solid #333;border-radius:8px;padding:9px 12px;font-size:12px;color:#aaa;display:flex;justify-content:space-between;align-items:center">
            <span>C:\Users\Administrator\.openclaw\skills</span>
            <button class="btn btn-secondary" style="padding:4px 10px;font-size:11px">打开</button>
          </div>
        </div>
        <div>
          <div style="font-size:12px;color:#888;margin-bottom:6px">拖入 ZIP 文件安装</div>
          <div style="border:1.5px dashed #333;border-radius:10px;height:100px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;color:#555;font-size:12px;cursor:pointer"
               onmouseenter="this.style.borderColor='#555'" onmouseleave="this.style.borderColor='#333'">
            <span style="font-size:24px">📦</span>
            拖入技能 ZIP 包，或<span style="color:#4f8fff;cursor:pointer">点击选择文件</span>
          </div>
        </div>
      </div>
    </div>

  </div><!-- /body -->

  <!-- Bottom detail panel -->
  <div class="bottom-panel" id="bottom-panel">
    <div class="panel-row">
      <div class="panel-icon" id="panel-icon">🔧</div>
      <div class="panel-info">
        <div class="panel-name" id="panel-name">技能名称</div>
        <div class="panel-desc" id="panel-desc">技能描述</div>
      </div>
      <div class="panel-actions">
        <button class="btn btn-secondary" id="panel-btn-secondary" style="display:none"></button>
        <button class="btn btn-primary" id="panel-btn-primary" onclick="handlePrimaryBtn()">安装</button>
        <button class="panel-close" onclick="closePanel()">✕</button>
      </div>
    </div>
    <div class="panel-meta" id="panel-meta"></div>
  </div>
</div>

<script>
const SKILLS = [
  { id:'web-search', icon:'🌐', name:'网页搜索', desc:'实时搜索互联网，获取最新资讯和内容。', tags:['search','free'], version:'1.2.0', author:'OpenClaw', official:true, installed:true },
  { id:'code-exec',  icon:'⚡', name:'代码执行', desc:'在沙箱中运行 Python/JS 代码，支持数据分析与自动化。', tags:['code','auto'], version:'0.9.4', author:'OpenClaw', official:true, installed:true },
  { id:'file-rw',    icon:'📄', name:'文件读写', desc:'读取和写入本地文件，处理 CSV、PDF、Word 等格式。', tags:['doc','auto','free'], version:'1.0.1', author:'OpenClaw', official:true, installed:true },
  { id:'gmail',      icon:'📧', name:'Gmail 助手', desc:'读取、发送、归档邮件，智能分类收件箱。', tags:['mail','api'], version:'0.7.2', author:'community', official:false, installed:false },
  { id:'gcalendar',  icon:'📅', name:'Google 日历', desc:'查询与创建日程，智能安排会议时间。', tags:['calendar','api','free'], version:'0.5.0', author:'community', official:false, installed:false },
  { id:'postgres',   icon:'🐘', name:'PostgreSQL', desc:'查询和操作 PostgreSQL 数据库，生成报表。', tags:['db','code'], version:'1.1.0', author:'community', official:false, installed:false },
  { id:'github',     icon:'🐙', name:'GitHub 工具', desc:'管理仓库、Issues、PR，自动化 CI/CD 流程。', tags:['code','agent','api'], version:'0.8.3', author:'community', official:false, installed:false },
  { id:'notion',     icon:'📝', name:'Notion 同步', desc:'读写 Notion 数据库，整理知识与任务。', tags:['doc','agent'], version:'0.4.1', author:'community', official:false, installed:false },
  { id:'zapier',     icon:'⚡', name:'Zapier 触发', desc:'通过 Zapier 连接 5000+ 应用，实现跨平台自动化。', tags:['auto','api'], version:'0.6.0', author:'community', official:false, installed:false },
  { id:'browser',    icon:'🖥️', name:'浏览器控制', desc:'自动操控浏览器，填表、截图、抓取数据。', tags:['auto','agent'], version:'1.0.0', author:'community', official:false, installed:false },
  { id:'slack-tool', icon:'🔵', name:'Slack 工具', desc:'发送消息、查询频道、搜索历史记录。', tags:['agent','api'], version:'0.3.2', author:'community', official:false, installed:false },
  { id:'mysql',      icon:'🗄️', name:'MySQL 查询', desc:'连接 MySQL 数据库，执行查询和数据操作。', tags:['db','free'], version:'0.9.0', author:'community', official:false, installed:false },
];

let activeTag = 'all';
let activeCard = null;
let currentSkill = null;
let installing = new Set();

function renderGrid(skills) {
  const grid = document.getElementById('skills-grid');
  if (!skills.length) {
    grid.innerHTML = '<div class="empty-state" style="grid-column:1/-1"><div class="empty-icon">🔍</div><div>未找到匹配的技能</div></div>';
    return;
  }
  grid.innerHTML = skills.map(s => `
    <div class="skill-card${activeCard===s.id?' active':''}" onclick="selectSkill('${s.id}')" id="card-${s.id}">
      <div class="card-top">
        <div class="card-icon">${s.icon}</div>
        ${s.installed
          ? '<span class="card-badge badge-installed">已安装</span>'
          : s.official
            ? '<span class="card-badge badge-official">官方</span>'
            : '<span class="card-badge badge-free">免费</span>'}
      </div>
      <div class="card-name">${s.name}</div>
      <div class="card-desc">${s.desc}</div>
      <div class="card-meta">
        <span>v${s.version}</span>
        <span class="dot"></span>
        <span>${s.author}</span>
      </div>
    </div>
  `).join('');
}

function renderInstalled() {
  const list = document.getElementById('installed-list');
  const installed = SKILLS.filter(s => s.installed);
  list.innerHTML = installed.map(s => `
    <div class="installed-item" onclick="selectSkill('${s.id}')">
      <div class="installed-item-icon">${s.icon}</div>
      <div class="installed-item-info">
        <div class="installed-item-name">${s.name}</div>
        <div class="installed-item-version">v${s.version} · ${s.author}</div>
      </div>
      <div style="font-size:11px;color:#555">${s.desc.slice(0,20)}…</div>
      <div class="installed-item-status"></div>
    </div>
  `).join('');
}

function getFiltered() {
  return SKILLS.filter(s => activeTag === 'all' || s.tags.includes(activeTag));
}

function filterTag(tag, el) {
  activeTag = tag;
  document.querySelectorAll('.tag').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  renderGrid(getFiltered());
}

function filterSkills(q) {
  const lower = q.toLowerCase().trim();
  if (!lower) { renderGrid(getFiltered()); return; }
  renderGrid(getFiltered().filter(s => s.name.includes(q) || s.desc.includes(q)));
}

function selectSkill(id) {
  activeCard = id;
  currentSkill = SKILLS.find(s => s.id === id);
  document.querySelectorAll('.skill-card').forEach(c => c.classList.remove('active'));
  const card = document.getElementById('card-' + id);
  if (card) card.classList.add('active');
  openPanel(currentSkill);
}

function openPanel(s) {
  document.getElementById('panel-icon').textContent = s.icon;
  document.getElementById('panel-name').textContent = s.name;
  document.getElementById('panel-desc').textContent = s.desc;

  const pb = document.getElementById('panel-btn-primary');
  const sb = document.getElementById('panel-btn-secondary');

  if (s.installed) {
    pb.textContent = '卸载';
    pb.className = 'btn btn-danger';
    sb.style.display = 'none';
  } else if (installing.has(s.id)) {
    pb.innerHTML = '<span class="spinner"></span>安装中…';
    pb.className = 'btn btn-primary';
    pb.disabled = true;
    sb.style.display = 'none';
  } else {
    pb.textContent = '安装';
    pb.className = 'btn btn-primary';
    pb.disabled = false;
    sb.style.display = 'none';
  }

  document.getElementById('panel-meta').innerHTML = `
    <div class="panel-meta-item"><div class="panel-meta-label">版本</div><div class="panel-meta-value">v${s.version}</div></div>
    <div class="panel-meta-item"><div class="panel-meta-label">作者</div><div class="panel-meta-value">${s.author}</div></div>
    <div class="panel-meta-item"><div class="panel-meta-label">标签</div><div class="panel-meta-value">${s.tags.join(' · ')}</div></div>
    <div class="panel-meta-item"><div class="panel-meta-label">来源</div><div class="panel-meta-value">${s.official ? 'OpenClaw 官方' : 'ClawHub 社区'}</div></div>
  `;

  document.getElementById('bottom-panel').classList.add('visible');
}

function closePanel() {
  document.getElementById('bottom-panel').classList.remove('visible');
  activeCard = null;
  document.querySelectorAll('.skill-card').forEach(c => c.classList.remove('active'));
}

function handlePrimaryBtn() {
  if (!currentSkill) return;
  const s = currentSkill;
  if (s.installed) {
    s.installed = false;
    renderGrid(getFiltered());
    renderInstalled();
    closePanel();
    return;
  }
  installing.add(s.id);
  openPanel(s);
  setTimeout(() => {
    installing.delete(s.id);
    s.installed = true;
    renderGrid(getFiltered());
    renderInstalled();
    openPanel(s);
    document.getElementById('installed-count').textContent = SKILLS.filter(x=>x.installed).length;
  }, 1800);
}

function switchTab(tab, el) {
  document.querySelectorAll('.sidebar-item').forEach(i => i.classList.remove('active'));
  el.classList.add('active');
  ['market','installed','local','import'].forEach(t => {
    document.getElementById('tab-'+t).style.display = t===tab ? 'flex' : 'none';
  });
  closePanel();
  if (tab === 'installed') renderInstalled();
}

function setView(v, el) {
  document.querySelectorAll('.view-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
}

// Init
renderGrid(SKILLS);
renderInstalled();
</script>
</body>
</html>
