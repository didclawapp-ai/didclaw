name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
  workflow_dispatch:
    inputs:
      draft:
        description: 'Create as draft release'
        type: boolean
        default: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# Only one release job runs at a time per tag
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Gate: lint + typecheck + tests must pass before any build starts
  check:
    name: Lint · Typecheck · Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: didclaw-ui/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: didclaw-ui
        run: pnpm install --frozen-lockfile

      - name: Lint
        working-directory: didclaw-ui
        run: pnpm lint

      - name: Typecheck
        working-directory: didclaw-ui
        run: pnpm typecheck

      - name: Unit tests
        working-directory: didclaw-ui
        run: pnpm test

  build-windows:
    name: Windows (exe + msi)
    needs: check
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: didclaw-ui/pnpm-lock.yaml

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      # Cache compiled Rust crates between runs — saves ~5–10 min per build
      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './didclaw-ui/src-tauri -> target'

      - name: Install frontend dependencies
        working-directory: didclaw-ui
        run: pnpm install --frozen-lockfile

      # Build frontend + Tauri, then upload artifacts to a GitHub Release.
      # When triggered by a v* tag, a real release is created.
      # When triggered manually (workflow_dispatch), tagName is empty so
      # tauri-action builds only — useful for verifying the pipeline without publishing.
      - name: Build and publish release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: didclaw-ui
          tauriScript: pnpm tauri
          args: --config src-tauri/tauri.build.conf.json --bundles nsis,msi
          tagName: ${{ startsWith(github.ref, 'refs/tags/v') && github.ref_name || '' }}
          releaseName: 'DidClaw ${{ github.ref_name }}'
          releaseBody: |
            See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) for full details.
          releaseDraft: ${{ github.event_name == 'workflow_dispatch' && inputs.draft || true }}
          prerelease: false
