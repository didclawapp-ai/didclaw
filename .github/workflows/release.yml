name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
  workflow_dispatch:
    inputs:
      draft:
        description: 'Create as draft release'
        type: boolean
        default: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# Workflow-level write permission so GITHUB_TOKEN can create releases
permissions:
  contents: write

# Only one release job runs at a time per tag
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Gate: lint + typecheck + tests must pass before any build starts
  check:
    name: Lint · Typecheck · Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: didclaw-ui/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: didclaw-ui
        run: pnpm install --frozen-lockfile

      - name: Lint
        working-directory: didclaw-ui
        run: pnpm lint

      - name: Typecheck
        working-directory: didclaw-ui
        run: pnpm typecheck

      - name: Unit tests
        working-directory: didclaw-ui
        run: pnpm test

  build-windows:
    name: Windows (exe + msi)
    needs: check
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: didclaw-ui/pnpm-lock.yaml

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      # Cache compiled Rust crates between runs — saves ~5–10 min per build
      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './didclaw-ui/src-tauri -> target'

      - name: Install frontend dependencies
        working-directory: didclaw-ui
        run: pnpm install --frozen-lockfile

      - name: Build Tauri app
        working-directory: didclaw-ui
        run: pnpm tauri build --config src-tauri/tauri.build.conf.json --bundles nsis,msi

      # Upload both installers as job artifacts (accessible even without a release)
      - name: Upload installers
        uses: actions/upload-artifact@v4
        with:
          name: windows-installers
          path: |
            didclaw-ui/src-tauri/target/release/bundle/nsis/*.exe
            didclaw-ui/src-tauri/target/release/bundle/msi/*.msi
          if-no-files-found: error

      # Create GitHub Release only when triggered by a v* tag
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          prerelease: false
          name: DidClaw ${{ github.ref_name }}
          body: |
            See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) for full details.
          files: |
            didclaw-ui/src-tauri/target/release/bundle/nsis/*.exe
            didclaw-ui/src-tauri/target/release/bundle/msi/*.msi
